<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Multi-Tool | Official Hub</title>
    <style>
        :root {
            --primary-glow: #00ff88;
            --accent-color: #ff0055;
            --bg-color: #0a0a0b;
            --card-bg: #16161a;
            --text-color: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            width: 90%;
            text-align: center;
            padding: 40px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(0, 255, 136, 0.1);
            color: var(--primary-glow);
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 20px;
            border: 1px solid var(--primary-glow);
            text-transform: uppercase;
        }

        h1 {
            font-size: 2.2rem;
            margin: 0 0 10px 0;
            background: linear-gradient(90deg, var(--primary-glow), #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .features {
            text-align: left;
            margin: 25px 0;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 12px;
        }

        .feature-item {
            margin: 8px 0;
            font-size: 0.95rem;
            color: #bbb;
        }

        .feature-item::before {
            content: "» ";
            color: var(--primary-glow);
        }

        .download-btn {
            display: block;
            width: 100%;
            box-sizing: border-box;
            padding: 18px;
            background: linear-gradient(45deg, var(--primary-glow), #00d4ff);
            color: #000;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 12px;
            transition: 0.3s;
            margin-top: 20px;
        }

        .download-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .footer {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="status">Online & Undetected 2026</div>
    <h1>Multi-Tool Hub</h1>
    <p style="color: #888;">Safe & Automated Roblox Solutions</p>

    <div class="features">
        <div class="feature-item">Multi-Instance Manager</div>
        <div class="feature-item">Advanced Auto-Farm Logic</div>
        <div class="feature-item">Anti-Ban Protection</div>
        <div class="feature-item">FPS Optimizer</div>
    </div>

    <a href="ССЫЛКА_НА_ТВОЙ_ФАЙЛ" class="download-btn">DOWNLOAD TOOL (.ZIP)</a>

    <div class="footer">
        Compatible with Windows 10/11<br>
        Verified by Community
    </div>
</div>

</body>
</html>
